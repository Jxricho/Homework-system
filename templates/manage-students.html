<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการข้อมูลนักเรียน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #8e6f51; --bg: #fdfaf6; --card-bg: #ffffff; --text: #4a3e3d; --accent: #f5ebe0; --danger: #c94c4c; }
        body { font-family: 'Sarabun', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 650px; background: var(--card-bg); padding: 34px 24px; border-radius: 24px; box-shadow: 0 10px 35px rgba(142, 111, 81, 0.08); box-sizing: border-box; text-align: center; }
        h2 { margin: 0 0 8px 0; font-size: 24px; color: var(--primary); font-weight: 700; }
        .filter-section { margin: 15px 0 20px 0; text-align: left; background: var(--accent); padding: 12px 16px; border-radius: 12px; display: flex; align-items: center; gap: 10px; }
        select { padding: 8px 12px; font-family: 'Sarabun'; border-radius: 8px; border: 1px solid var(--primary); font-size: 14px; outline: none; }
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 12px; border: 1px solid var(--accent); }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 550px; }
        th, td { padding: 12px 14px; font-size: 15px; border-bottom: 1px solid var(--accent); }
        th { background-color: var(--accent); color: var(--text); font-weight: 600; }
        .delete-btn { background-color: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 8px; font-family: 'Sarabun'; font-size: 13px; font-weight: 600; cursor: pointer; }
        .nav-link { display: block; text-align: center; margin-top: 24px; color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 600; }
        @media (max-width: 500px) { body { padding: 0; align-items: flex-start; } .container { margin: 0; border-radius: 0; min-height: 100vh; padding: 24px 16px; } }
    </style>
</head>
<body>
<div class="container">
    <h2>🗂️ รายชื่อนักเรียนในระบบทั้งหมด</h2>
    
    <div class="filter-section">
        <label style="font-weight:600;">🔍 เลือกห้องเรียน (Sec):</label>
        <select id="gradeFilter" onchange="filterStudents()">
            <option value="all">แสดงทั้งหมดทุกชั้นเรียน</option>
        </select>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>รหัส QR</th>
                    <th>ชื่อ-นามสกุล (ชื่อเล่น)</th>
                    <th>ชั้น/ห้อง</th>
                    <th>เลขที่</th>
                    <th style="text-align: center;">จัดการ</th>
                </tr>
            </thead>
            <tbody id="studentTableBody"></tbody>
        </table>
    </div>
    <a href="/" class="nav-link">🔙 กลับไปหน้าเมนูหลัก</a>
</div>
<script>
    let allStudents = [];

    window.onload = function() {
        fetch("/api/students")
        .then(res => res.json())
        .then(students => {
            allStudents = students;
            
            // ดึงระดับชั้นที่มีทั้งหมดมาทำตัวเลือก Dropdown อัตโนมัติ
            const grades = [...new Set(students.map(s => s.grade))].sort();
            const filterSelect = document.getElementById("gradeFilter");
            grades.forEach(g => {
                const opt = document.createElement("option"); opt.value = g; opt.textContent = `ชั้น ${g}`;
                filterSelect.appendChild(opt);
            });
            
            renderTable(allStudents);
        });
    }

    function renderTable(data) {
        const tbody = document.getElementById("studentTableBody");
        tbody.innerHTML = "";
        if(data.length === 0) {
            tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; color:gray;'>ไม่มีข้อมูลนักเรียนในห้องนี้</td></tr>";
            return;
        }
        
        // เรียงลำดับตามเลขที่นักเรียนเพื่อความเรียบร้อย
        data.sort((a,b) => parseInt(a.no) - parseInt(b.no));

        data.forEach(std => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td><code>${std.id}</code></td>
                <td><b>${std.name}</b> ${std.nickname ? `(${std.nickname})` : ''}</td>
                <td>ชั้น ${std.grade}</td>
                <td>เลขที่ ${std.no}</td>
                <td style="text-align: center; white-space: nowrap;">
                    <a href="/student-dashboard?std_id=${std.id}" style="display:inline-block; background-color:var(--primary); color:white; text-decoration:none; padding:6px 12px; border-radius:8px; font-size:13px; font-weight:600; margin-right:5px;">ดูประวัติงาน</a>
                    <button class="delete-btn" onclick="deleteStudent('${std.id}', '${std.name}')">ลบ</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function filterStudents() {
        const selectedGrade = document.getElementById("gradeFilter").value;
        if(selectedGrade === "all") {
            renderTable(allStudents);
        } else {
            const filtered = allStudents.filter(s => s.grade === selectedGrade);
            renderTable(filtered);
        }
    }

    function deleteStudent(id, name) {
        if (confirm(`คุณครูแน่ใจใช่ไหมว่าจะลบข้อมูลของ "${name}"?`)) {
            fetch(`/api/delete-student/${id}`, { method: "DELETE" })
            .then(res => res.json())
            .then(data => { alert("✨ " + data.message); window.location.reload(); });
        }
    }
</script>
</body>
</html>
