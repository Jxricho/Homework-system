<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการรายการการบ้าน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8e6f51;
            --primary-hover: #73563c;
            --bg: #fdfaf6;
            --card-bg: #ffffff;
            --text: #4a3e3d;
            --text-light: #8c827a;
            --accent: #f5ebe0;
            --danger: #c94c4c;
            --danger-hover: #b03a3a;
        }
        body {
            font-family: 'Sarabun', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 650px;
            background: var(--card-bg); padding: 34px 24px;
            border-radius: 24px; box-shadow: 0 10px 35px rgba(142, 111, 81, 0.08);
            box-sizing: border-box; text-align: center;
        }
        h2 { margin: 0 0 8px 0; font-size: 24px; color: var(--primary); font-weight: 700; }
        .subtitle { margin: 0 0 24px 0; font-size: 14px; color: var(--text-light); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: left; }
        th, td { padding: 12px 14px; font-size: 15px; border-bottom: 1px solid var(--accent); }
        th { background-color: var(--accent); color: var(--text); font-weight: 600; }
        
        .delete-btn {
            background-color: var(--danger); color: white; border: none;
            padding: 6px 12px; border-radius: 8px; font-family: 'Sarabun', sans-serif;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .delete-btn:hover { background-color: var(--danger-hover); }
        .nav-link { display: block; text-align: center; margin-top: 24px; color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <h2>📖 รายการการบ้านในระบบทั้งหมด</h2>
    <p class="subtitle">คุณครูสามารถตรวจสอบรายการงาน หรือกดลบหัวข้อการบ้านที่กรอกผิด/หมดเขตแล้วได้จากหน้านี้</p>
    
    <table>
        <thead>
            <tr>
                <th>รหัสการบ้าน</th>
                <th>วิชา</th>
                <th>ชิ้นงาน / หัวข้อ</th>
                <th>กำหนดส่ง</th>
                <th style="text-align: center;">จัดการ</th>
            </tr>
        </thead>
        <tbody id="hwTableBody">
            </tbody>
    </table>
    
    <a href="/" class="nav-link">🔙 กลับไปหน้าเมนูหลัก</a>
</div>

<script>
    // 1. ดึงข้อมูลการบ้านทั้งหมดมาโชว์ตอนเปิดหน้า
    function loadHomeworks() {
        fetch("http://127.0.0.1:8000/api/homeworks")
        .then(response => response.json())
        .then(homeworks => {
            const tbody = document.getElementById("hwTableBody");
            tbody.innerHTML = "";
            
            if(homeworks.length === 0) {
                tbody.innerHTML = "<tr><td colspan='5' style='text-align:center; color:gray;'>ไม่มีข้อมูลการบ้านในระบบ</td></tr>";
                return;
            }

            homeworks.forEach(hw => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td><code>${hw.id}</code></td>
                    <td><b>${hw.subject}</b></td>
                    <td>${hw.title}</td>
                    <td>📅 ${hw.due_date}</td>
                    <td style="text-align: center;">
                        <button class="delete-btn" onclick="deleteHomework('${hw.id}', '${hw.title}')">ลบการบ้าน</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        });
    }

    // 2. ฟังก์ชันสั่งลบการบ้าน
    function deleteHomework(id, title) {
        if (confirm(`⚠️ คำเตือนสำคัญ!\nหากคุณครูลบการบ้าน "${title}" ประวัติการส่งงานชิ้นนี้ของนักเรียนทุกคนจะถูกลบไปด้วย\nคุณครูแน่ใจใช่ไหมครับว่าจะลบถาวร?`)) {
            fetch(`/api/delete-homework/${id}`, {
                method: "DELETE"
            })
            .then(response => response.json())
            .then(data => {
                alert("✨ " + data.message);
                loadHomeworks(); // รีเฟรชตารางงานใหม่ทันที
            })
            .catch(err => alert("เกิดข้อผิดพลาดในการลบข้อมูล"));
        }
    }

    window.onload = loadHomeworks;
</script>
</body>
</html>
