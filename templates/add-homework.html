<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มการบ้านใหม่</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8e6f51;
            --primary-hover: #73563c;
            --bg: #fdfaf6;
            --card-bg: #ffffff;
            --text: #4a3e3d;
            --text-light: #8c827a;
            --accent: #f5ebe0;
        }
        body {
            font-family: 'Sarabun', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            width: 100%; max-width: 450px; margin: 20px;
            background: var(--card-bg); padding: 34px 24px;
            border-radius: 24px; box-shadow: 0 10px 35px rgba(142, 111, 81, 0.08);
            box-sizing: border-box;
        }
        h2 { margin: 0 0 20px 0; font-size: 22px; color: var(--primary); text-align: center; }
        .form-group { margin-bottom: 16px; text-align: left; }
        label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
        input {
            width: 100%; padding: 12px; border: 2px solid var(--accent); border-radius: 12px;
            font-size: 15px; font-family: 'Sarabun', sans-serif; box-sizing: border-box; outline: none;
            color: var(--text);
        }
        input:focus { border-color: var(--primary); }
        .submit-btn {
            width: 100%; padding: 14px; background-color: var(--primary); color: white;
            border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px;
        }
        .submit-btn:hover { background-color: var(--primary-hover); }
        #message { display: none; margin-top: 15px; padding: 12px; border-radius: 12px; text-align: center; font-weight: 600; }
        .success { background-color: #ecf3ee; color: #3b5c43; }
        .nav-link { display: block; text-align: center; margin-top: 15px; color: var(--primary); text-decoration: none; font-size: 14px; }

        /* 📱 ปรับแต่งฟอร์มสำหรับหน้าจอมือถือ */
        @media (max-width: 500px) {
            body { align-items: flex-start; }
            .container { margin: 0; border-radius: 0; min-height: 100vh; padding: 30px 20px; }
            h2 { font-size: 20px; }
            input { padding: 14px 12px; font-size: 16px; } /* ขยายช่องกรอกให้จิ้มนิ้วพิมพ์ง่ายขึ้น */
            .submit-btn { padding: 16px; font-size: 17px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>➕ เพิ่มรายการการบ้านใหม่</h2>
    
    <div class="form-group">
        <label>รหัสการบ้าน (เช่น HW03):</label>
        <input type="text" id="hwId" placeholder="กรอกรหัสไม่ให้ซ้ำกัน">
    </div>
    <div class="form-group">
        <label>ชื่อวิชา:</label>
        <input type="text" id="subject" placeholder="เช่น คณิตศาสตร์, ภาษาไทย">
    </div>
    <div class="form-group">
        <label>ชิ้นงาน / หัวข้อการบ้าน:</label>
        <input type="text" id="title" placeholder="เช่น ใบงานที่ 3 เรื่องการคูณ">
    </div>
    <div class="form-group">
        <label>วันกำหนดส่งสุดท้าย (Due Date):</label>
        <input type="date" id="dueDate">
    </div>

    <button class="submit-btn" onclick="addHomework()">บันทึกการบ้านลงระบบ</button>
    
    <div id="message"></div>
    <a href="/" class="nav-link">🔙 กลับไปหน้าเมนูหลัก</a>
</div>

<script>
    function addHomework() {
        const hwId = document.getElementById("hwId").value.trim();
        const subject = document.getElementById("subject").value.trim();
        const title = document.getElementById("title").value.trim();
        const dueDate = document.getElementById("dueDate").value;

        if(!hwId || !subject || !title || !dueDate) {
            alert("กรุณากรอกข้อมูลให้ครบทุกช่องครับ");
            return;
        }

        fetch("http://127.0.0.1:8000/api/add-homework", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                id: hwId,
                subject: subject,
                title: title,
                due_date: dueDate
            })
        })
        .then(response => response.json())
        .then(data => {
            const msgDiv = document.getElementById("message");
            msgDiv.style.display = "block";
            msgDiv.className = "success";
            msgDiv.textContent = "✨ " + data.message;
            
            document.getElementById("hwId").value = "";
            document.getElementById("subject").value = "";
            document.getElementById("title").value = "";
            document.getElementById("dueDate").value = "";
            
            setTimeout(() => { msgDiv.style.display = "none"; }, 3000);
        });
    }
</script>
</body>
</html>
